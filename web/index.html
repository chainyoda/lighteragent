function gen(n, start, drift, vol) {
  let v = start, out = [v];
  for (let i = 1; i < n; i++) {
    const noise = (Math.sin(i * 1.7) + Math.cos(i * 0.9)) * 0.5;
    v = Math.max(40, v * (1 + drift + noise * vol * 0.01));
    out.push(v);
  }
  return out;
}

function Spark({ data, color = "#818cf8", w = 120, h = 32 }) {
  const min = Math.min(...data), max = Math.max(...data);
  const span = max - min || 1;
  const path = data
    .map((v, i) => {
      const x = (i / (data.length - 1)) * w;
      const y = h - ((v - min) / span) * h;
      return `${i === 0 ? "M" : "L"}${x.toFixed(1)},${y.toFixed(1)}`;
    })
    .join(" ");
  return (
    <svg width={w} height={h} className="spark">
      <path d={path} fill="none" stroke={color} strokeWidth="1.5" />
    </svg>
  );
}

          <div className="grid grid-cols-2 gap-4">
            <Field label="Performance fee (bps)">
              <input type="number" value={form.perfFeeBps} onChange={set("perfFeeBps")}
                className="w-full bg-transparent border border-white/10 rounded-md px-3 py-2 outline-none focus:border-indigo-400 mono" />
              <div className="text-xs text-neutral-500 mt-1">{bps(form.perfFeeBps)} on PnL above HWM</div>
            </Field>
            <Field label="Per-trade fee (bps)">
              <input type="number" value={form.txFeeBps} onChange={set("txFeeBps")}
                className="w-full bg-transparent border border-white/10 rounded-md px-3 py-2 outline-none focus:border-indigo-400 mono" />
              <div className="text-xs text-neutral-500 mt-1">{bps(form.txFeeBps)} on trade notional</div>
            </Field>
          </div>
          <div className="text-xs text-neutral-500 mt-2">No protocol caps. Investors see your fee schedule prominently.</div>
        </Step>

        <button
          disabled={!valid}
          onClick={() => alert("VaultFactory.createVault tx submitted (mock)")}
          className="w-full py-3 rounded-md bg-indigo-500 hover:bg-indigo-400 disabled:bg-white/5 disabled:text-neutral-500 text-white text-sm font-medium glow disabled:shadow-none"
        >
          {valid ? "Deploy vault" : "Fill name, image hash and TEE wallet"}
        </button>
      </div>
    </div>
  );
}

function Step({ n, title, children }) {
  return (
    <div className="rounded-xl border border-white/5 p-5">
      <div className="flex items-center gap-3 mb-3">
        <div className="h-6 w-6 rounded-full bg-indigo-500/20 text-indigo-300 text-xs flex items-center justify-center mono">
          {n}
        </div>
        <div className="font-medium">{title}</div>
      </div>
      <div className="space-y-3">{children}</div>
    </div>
  );
}

function Field({ label, children }) {
  return (
    <label className="block">
      <div className="text-xs text-neutral-500 uppercase tracking-wider mb-1">{label}</div>
      {children}
    </label>
  );
}

function Portfolio({ account, setRoute }) {
  if (!account)
    return (
      <div className="max-w-md mx-auto px-5 py-24 text-center">
        <div className="text-lg">Connect your wallet to see your positions.</div>
      </div>
    );
  const positions = VAULTS.slice(0, 2).map((v) => ({ ...v, shares: 132.4, value: 14_280 }));
  return (
    <div className="max-w-6xl mx-auto px-5 py-10">
      <div className="text-xs text-neutral-500 uppercase tracking-wider">Your positions</div>
      <h1 className="text-2xl font-semibold mb-6">Portfolio</h1>
      <div className="grid grid-cols-1 md:grid-cols-3 gap-5 mb-8">
        <Stat label="Deposited" value="$28,560" />
        <Stat label="Current value" value="$31,420" />
        <Stat label="P&L" value={<span className="text-emerald-400">+$2,860 (+10.0%)</span>} />
      </div>
      <div className="rounded-xl border border-white/5 overflow-hidden">
        <table className="w-full text-sm">
          <thead className="bg-white/[0.02] text-neutral-500 text-xs uppercase tracking-wider">
            <tr>
              <th className="text-left px-4 py-3 font-normal">Vault</th>
              <th className="text-right px-4 py-3 font-normal">Shares</th>
              <th className="text-right px-4 py-3 font-normal">Value</th>
              <th className="text-right px-4 py-3 font-normal"></th>
            </tr>
          </thead>
          <tbody>
            {positions.map((p) => (
              <tr key={p.id} className="border-t border-white/5">
                <td className="px-4 py-3">{p.name}</td>
                <td className="px-4 py-3 text-right mono">{p.shares}</td>
                <td className="px-4 py-3 text-right mono">{fmtUsd(p.value)}</td>
                <td className="px-4 py-3 text-right">
                  <button onClick={() => setRoute({ name: "vault", id: p.id })} className="text-indigo-300 text-xs">Manage →</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function Docs() {
  return (
    <div className="max-w-3xl mx-auto px-5 py-12 prose prose-invert">
      <h1>How EigenStrategies works</h1>
      <p>Three planes:</p>
      <ol>
        <li><b>Custody</b> — USDC sits in an ERC-4626 vault on L2. Investors mint and burn shares.</li>
        <li><b>Execution</b> — the strategy runs in an EigenCompute TEE. Its KMS-derived wallet is the only key allowed to bridge funds to Lighter.</li>
        <li><b>Settlement</b> — each vault owns one Lighter sub-account; PnL flows back through the bridge.</li>
      </ol>
      <p>The full architecture is in the <a href="https://github.com/chainyoda/lighteragent">README</a>.</p>
    </div>
  );
}

function App() {
  const [route, setRoute] = useState({ name: "discover" });
  const [account, setAccount] = useState(null);
  return (
    <div>
      <Nav route={route} setRoute={setRoute} account={account} setAccount={setAccount} />
      {route.name === "discover" && <Discover setRoute={setRoute} />}
      {route.name === "vault" && <VaultDetail id={route.id} setRoute={setRoute} account={account} />}
      {route.name === "create" && <Create setRoute={setRoute} />}
      {route.name === "portfolio" && <Portfolio account={account} setRoute={setRoute} />}
      {route.name === "docs" && <Docs />}
      <footer className="border-t border-white/5 mt-16">
        <div className="max-w-6xl mx-auto px-5 py-6 text-xs text-neutral-500 flex justify-between">
          <div>EigenStrategies · prototype · all data is mocked</div>
          <a href="https://github.com/chainyoda/lighteragent" className="hover:text-neutral-300">GitHub →</a>
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
